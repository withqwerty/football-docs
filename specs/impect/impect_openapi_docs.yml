components:
  # ──────────────────────────────────────────────
  # Security Schemes
  # ──────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Keycloak-issued JWT token. Obtain from https://login.impect.com/.
        All endpoints require the 'API' role.

  # ──────────────────────────────────────────────
  # Reusable Parameters
  # ──────────────────────────────────────────────
  parameters:
    iterationId:
      name: iterationId
      in: path
      required: true
      description: The iteration (season/competition) identifier.
      schema:
        type: integer
        format: int64

    matchId:
      name: matchId
      in: path
      required: true
      description: The match identifier.
      schema:
        type: integer
        format: int64

    squadId:
      name: squadId
      in: path
      required: true
      description: The squad identifier.
      schema:
        type: integer
        format: int64

    positions:
      name: positions
      in: path
      required: true
      description: Comma-separated list of positions to filter by.
      schema:
        type: array
        items:
          type: string
          enum:
            - BANK
            - GOALKEEPER
            - LEFT_BACK
            - RIGHT_BACK
            - CENTER_BACK
            - LEFT_MIDFIELD
            - RIGHT_MIDFIELD
            - CENTER_MIDFIELD
            - LEFT_WING
            - RIGHT_WING
            - CENTER_FORWARD
      style: simple

    since:
      name: since
      in: query
      required: true
      description: >-
        ISO 8601 timestamp. Only records changed/deleted after this
        timestamp will be returned.
      schema:
        type: string
        format: date-time

    language:
      name: language
      in: query
      required: false
      description: Language code for translated definitions.
      schema:
        type: string

    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: >-
        Ideally a UUID to correlate requests between client and server.
      schema:
        type: string

  # ──────────────────────────────────────────────
  # Reusable Responses
  # ──────────────────────────────────────────────
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseObject'

    Unauthorized:
      description: If no Authorization header is present.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseObject'

    Forbidden:
      description: Your role does not allow it.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseObject'

    TooManyRequests:
      description: >-
        You have sent too many requests in a given amount of time.
        Use the RateLimit-Remaining header or sleep for the duration
        given by the Retry-After header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseObject'
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
        RateLimit-Remaining:
          description: Number of requests remaining in the current window.
          schema:
            type: integer
        RateLimit-Policy:
          description: Rate limit policy description.
          schema:
            type: string

  # ──────────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────────
  schemas:
    # ── Enums ──────────────────────────────────
    Gender:
      type: string
      enum: [MALE, FEMALE]

    SquadType:
      type: string
      enum: [NATIONAL_TEAM, CLUB]

    Leg:
      type: string
      enum: [LEFT, RIGHT, BOTH]

    DataVersion:
      type: string
      enum: [V1]

    Position:
      type: string
      enum:
        - BANK
        - GOALKEEPER
        - LEFT_BACK
        - RIGHT_BACK
        - CENTER_BACK
        - LEFT_MIDFIELD
        - RIGHT_MIDFIELD
        - CENTER_MIDFIELD
        - LEFT_WING
        - RIGHT_WING
        - CENTER_FORWARD

    PositionSide:
      type: string
      enum: [LEFT, RIGHT, CENTER]

    ActionType:
      type: string
      enum:
        - SHOT
        - PASS
        - DRIBBLE
        - TACKLE
        - INTERCEPTION
        - CLEARANCE
        - CROSS
        - FOUL
        - OFFSIDE

    Action:
      type: string
      enum:
        - LOW_PASS
        - HIGH_PASS
        - GROUND_DUEL
        - AIR_DUEL
        - SHOT
        - CROSS
        - CLEARANCE
        - INTERCEPTION
        - TACKLE
        - FOUL
        - OFFSIDE

    Phase:
      type: string
      enum:
        - SECOND_BALL
        - BUILD_UP
        - COUNTER_ATTACK
        - SET_PIECE

    PackingZone:
      type: string
      enum:
        - GKR
        - FIRST_THIRD
        - SECOND_THIRD
        - FINAL_THIRD
        - BOX

    PitchPosition:
      type: string
      enum:
        - OWN_BOX
        - OWN_HALF
        - OPPONENT_HALF
        - OPPONENT_BOX

    Lane:
      type: string
      enum:
        - LEFT_WING
        - LEFT_HALF_SPACE
        - CENTER
        - RIGHT_HALF_SPACE
        - RIGHT_WING

    SubstitutionType:
      type: string
      enum: [SUB_ON, SUB_OFF, TACTICAL_CHANGE]

    DeleteType:
      type: string
      enum: [DELETED, MERGED]

    SetPieceCategory:
      type: string
      enum:
        - FREE_KICK
        - CORNER
        - GOAL_KICK
        - THROW_IN
        - PENALTY

    SetPieceExecutionType:
      type: string
      enum: [DIRECT, INDIRECT]

    DuelType:
      type: string
      enum: [GROUND_DUEL, AIR_DUEL]

    ReceiverType:
      type: string
      enum: [TEAMMATE, OPPONENT]

    BodyPart:
      type: string
      enum: [FOOT, HEAD, OTHER]

    PassHeight:
      type: string
      enum: [LOW, MEDIUM, HIGH]

    EventResult:
      type: string
      enum: [SUCCESS, FAIL]

    DribbleType:
      type: string
      enum: [ONE_VS_ONE, ONE_VS_MANY]

    DribbleResult:
      type: string
      enum: [WINNER, LOSER]

    DistanceToOpponent:
      type: string
      enum:
        - LESS_THAN_ONE_METER
        - ONE_TO_THREE_METERS
        - MORE_THAN_THREE_METERS

    Woodwork:
      type: string
      enum: [LEFT_POST, RIGHT_POST, CROSSBAR]

    ProfileFactorType:
      type: string
      enum: [KPI, SCORE]

    EndZone:
      description: >-
        End-zone classification used in set-piece sub-phase analysis.
        Values are context-dependent per sub-phase type (corner, free kick,
        goal kick, throw-in, second delivery).
      type: string
      enum:
        - FAR_LEFT
        - FAR_RIGHT
        - NEAR_POST
        - FAR_POST
        - OPPOSITE_SIDE_1
        - OPPOSITE_SIDE_2
        - SAME_SIDE_1
        - SAME_SIDE_2
        - SIX_YARD_BOX
        - INSIDE_OWN_BOX
        - INSIDE_OPPONENT_BOX
        - OUTSIDE_BOX
        - LEFT_GOAL_KICK_ZONE
        - RIGHT_GOAL_KICK_ZONE
        - CENTER

    # ── Error Response ────────────────────────
    ErrorResponseObject:
      type: object
      properties:
        data:
          type: object
        status:
          type: integer
        message:
          type: string
        pagination:
          type: object

    # ── Common / Shared ────────────────────────
    CoordinateDto:
      type: object
      properties:
        x:
          type: number
          format: double
        y:
          type: number
          format: double

    GameTimeDto:
      type: object
      properties:
        gameTime:
          type: string
        gameTimeInSec:
          type: number
          format: double

    IdMappingDto:
      type: object
      description: >-
        ID mappings to external systems. Keys are provider names,
        values are arrays of string identifiers.
      additionalProperties:
        type: array
        items:
          type: string

    KpiDto:
      type: object
      properties:
        kpiId:
          type: integer
        value:
          type: number
          format: double

    IterationStepDto:
      type: object
      description: Represents a step or phase within an iteration.
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    # ── Master Data ────────────────────────────
    CompetitionDto:
      type: object
      properties:
        name:
          type: string
        id:
          type: integer
        type:
          type: string
        countryId:
          type: integer
        gender:
          $ref: '#/components/schemas/Gender'

    IterationDto:
      type: object
      properties:
        id:
          type: integer
        season:
          type: string
        competition:
          $ref: '#/components/schemas/CompetitionDto'
        dataVersion:
          $ref: '#/components/schemas/DataVersion'
        lastChangeTimestamp:
          type: string
          format: date-time
        idMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdMappingDto'

    MatchDayDto:
      type: object
      properties:
        index:
          type: integer
        name:
          type: string

    MatchInfoDto:
      type: object
      properties:
        iterationId:
          type: integer
        id:
          type: integer
        homeSquadId:
          type: integer
        awaySquadId:
          type: integer
        scheduledDate:
          type: string
          format: date-time
        lastCalculationDate:
          type: string
          format: date-time
        matchDay:
          $ref: '#/components/schemas/MatchDayDto'
        available:
          type: boolean
        idMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdMappingDto'

    SquadDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        countryId:
          type: integer
        type:
          $ref: '#/components/schemas/SquadType'
        gender:
          $ref: '#/components/schemas/Gender'
        imageUrl:
          type: string
        idMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdMappingDto'
        access:
          type: boolean

    PlayerDto:
      type: object
      properties:
        id:
          type: integer
        firstname:
          type: string
        lastname:
          type: string
        commonname:
          type: string
        birthdate:
          type: string
          format: date
        birthplace:
          type: string
        leg:
          $ref: '#/components/schemas/Leg'
        countryIds:
          type: array
          items:
            type: integer
        gender:
          $ref: '#/components/schemas/Gender'
        currentSquadId:
          type: integer
        idMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdMappingDto'

    CoachDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        shortName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        countryIds:
          type: array
          items:
            type: integer
        idMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdMappingDto'

    StadiumDto:
      type: object
      properties:
        id:
          type: integer
        pitchLength:
          type: number
          format: double
        pitchWidth:
          type: number
          format: double
        name:
          type: string
        address:
          type: string
        timeZone:
          type: string
        idMappings:
          type: array
          items:
            $ref: '#/components/schemas/IdMappingDto'

    CountryDetailDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        isoName:
          type: string
        isoCode:
          type: string
        fifaName:
          type: string
        fifaCode:
          type: string

    # ── Match Detail ───────────────────────────
    PlayerInMatchSquadInfoDto:
      type: object
      properties:
        id:
          type: integer
        shirtNumber:
          type: integer

    StartingPositionsInMatchSquadInfoDto:
      type: object
      properties:
        playerId:
          type: integer
        position:
          $ref: '#/components/schemas/Position'
        positionSide:
          $ref: '#/components/schemas/PositionSide'

    SubstitutionInMatchSquadInfoDto:
      type: object
      properties:
        gameTime:
          $ref: '#/components/schemas/GameTimeDto'
        playerId:
          type: integer
        toPosition:
          $ref: '#/components/schemas/Position'
        positionSide:
          $ref: '#/components/schemas/PositionSide'
        fromPosition:
          $ref: '#/components/schemas/Position'
        fromPositionSide:
          $ref: '#/components/schemas/PositionSide'
        exchangedPlayerId:
          type: integer
        substitutionType:
          $ref: '#/components/schemas/SubstitutionType'

    FormationAtGameTimeDto:
      type: object
      properties:
        gameTime:
          type: string
        gameTimeInSec:
          type: number
          format: double
        formation:
          type: string

    MatchSquadInfoDto:
      type: object
      properties:
        id:
          type: integer
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerInMatchSquadInfoDto'
        startingPositions:
          type: array
          items:
            $ref: '#/components/schemas/StartingPositionsInMatchSquadInfoDto'
        substitutions:
          type: array
          items:
            $ref: '#/components/schemas/SubstitutionInMatchSquadInfoDto'
        startingFormation:
          type: string
        formations:
          type: array
          items:
            $ref: '#/components/schemas/FormationAtGameTimeDto'
        coachId:
          type: integer

    MatchDto:
      type: object
      properties:
        id:
          type: integer
        dateTime:
          type: string
          format: date-time
        lastCalculationDate:
          type: string
          format: date-time
        iterationId:
          type: integer
        squadHome:
          $ref: '#/components/schemas/MatchSquadInfoDto'
        squadAway:
          $ref: '#/components/schemas/MatchSquadInfoDto'
        stadiumId:
          type: integer

    # ── Events ─────────────────────────────────
    EventPositionDto:
      type: object
      properties:
        coordinates:
          $ref: '#/components/schemas/CoordinateDto'
        adjCoordinates:
          $ref: '#/components/schemas/CoordinateDto'
        packingZone:
          $ref: '#/components/schemas/PackingZone'
        pitchPosition:
          $ref: '#/components/schemas/PitchPosition'
        lane:
          $ref: '#/components/schemas/Lane'

    EventPlayerDto:
      type: object
      properties:
        id:
