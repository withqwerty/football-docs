openapi: 3.0.1
info:
  title: Impect Customer API
  description: >-
    The Impect Customer API (v5) provides access to football match data,
    iteration-level statistics, KPI definitions, player and squad scores,
    event-level data, set pieces, and more.


    Base URL: https://api.impect.com


    Swagger docs: https://api.impect.com/v3/api-docs/CustomerAPI


    # Authentication

    All endpoints require a Bearer token obtained via Keycloak
    (https://login.impect.com/). The token must be passed in the
    `Authorization` header as `Bearer <token>`. All endpoints are protected
    by `hasRole('API')`.


    # Rate Limiting

    Requests are rate limited. Use the `RateLimit-Policy` and
    `RateLimit-Remaining` response headers to monitor usage. On receiving
    a 429 response, wait for the duration specified in the `Retry-After`
    header before retrying.
  version: "5.0"
  contact:
    name: Impect
    url: https://glossary.impect.com
servers:
  - url: https://api.impect.com
    description: Production

security:
  - bearerAuth: []

tags:
  - name: V5 Master Data
    description: Core reference data - iterations, matches, squads, players, coaches, stadiums, countries
  - name: V5 Iteration Level Data
    description: Aggregated KPIs and scores at the iteration (season/competition) level
  - name: V5 Match Level Data
    description: Match-level events, KPIs, scores, set pieces, and frame mappings
  - name: V5 Definitions
    description: KPI, score, profile, and squad score definitions
  - name: V5 Squad Ratings & Predictions
    description: Squad ratings and prediction model coefficients
  - name: V5 Update Feed
    description: Incremental update feeds for all entity types
  - name: V5 Delete Feed
    description: Incremental delete feeds for all entity types

